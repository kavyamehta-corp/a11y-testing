<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled-1</title>
    <style>
        input[type='radio']:focus+label::before {
            box-shadow: 0 0px 8px #f00;
            /* Replace '#f00' with the color value of $muted-red */
        }

        input[type="radio"] {
            clip-path: polygon(0 0);
            margin-right: 10px;
            position: absolute;
        }

        .radio-group label {
            cursor: pointer;
            padding: 5px 10px;
            border: 2px solid #ccc;
            border-radius: 5px;
            display: inline-block;
            position: relative;
            margin-right: 10px;
        }

        .radio-group label:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: inset 0 0 0 2px #ccc;
        }

        .radio-group input[type="radio"]:checked+label {
            font-weight: bold;
            border-color: #007bff;
        }

        .radio-group label span {
            /* Add your custom styles for the label text here */
            font-size: 16px;
            /* Example: setting font size */
            color: #333;
            /* Example: setting text color */
        }

        .radio-group input[type="radio"]:checked+label:before {
            box-shadow: inset 0 0 0 10px #007bff;
        }
    </style>
</head>

<body>
    <h1>Radio button test example</h1>
    <div class="radio-group">
        <input type="radio" id="apple" name="fruit" value="apple">
        <label for="apple">Apple</label><br>
        <input type="radio" id="banana" name="fruit" value="banana">
        <label for="banana">Banana</label><br>
        <input type="radio" id="orange" name="fruit" value="orange">
        <label for="orange">Orange</label>
    </div>
</body>
</html>
